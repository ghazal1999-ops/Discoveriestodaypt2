name: Update Daily Discoveries by Category

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-discoveries:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser

      - name: Generate master discoveries.json
        run: |
          python << 'PY'
          import json
          import re
          from datetime import datetime, timezone
          from urllib.parse import urlparse
          import feedparser

          MAX_PER_CATEGORY = 5

          CATEGORY_FEEDS = {
              "science": [
                  "https://www.sciencedaily.com/rss/top/science.xml",
                  "https://phys.org/rss-feed/",
                  "https://www.sciencenews.org/feed",
                  "https://scitechdaily.com/feed/"
              ],
              "tech": [
                  "http://feeds.arstechnica.com/arstechnica/index",
                  "https://techcrunch.com/feed/",
                  "https://www.theverge.com/rss/index.xml",
                  "https://www.wired.com/feed/rss",
                  "https://www.technologyreview.com/feed/"
              ],
              "medicine": [
                  "https://medicalxpress.com/rss-feed/",
                  "https://www.nih.gov/news-events/news-releases/feed",
                  "https://www.sciencedaily.com/rss/health_medicine.xml",
                  "https://www.news-medical.net/medical/feed/"
              ],
              "mathematics": [
                  "https://rss.arxiv.org/rss/math",
                  "https://www.quantamagazine.org/mathematics/feed/"
              ],
              "space": [
                  "https://www.nasa.gov/rss/dyn/breaking_news.rss",
                  "https://www.sciencedaily.com/rss/top/space_time.xml",
                  "https://www.space.com/feeds/all",
                  "https://www.esa.int/rssfeed/Our_Activities/Space_Science"
              ],
              "astronomy": [
                  "https://skyandtelescope.org/feed/",
                  "https://www.universetoday.com/feed/",
                  "https://www.space.com/feeds/all"
              ],
              "architecture": [
                  "https://www.archdaily.com/rss",
                  "https://www.dezeen.com/architecture/feed/",
                  "https://www.designboom.com/architecture/feed/"
              ],
              "construction": [
                  "https://www.constructiondive.com/feeds/news/",
                  "https://www.engineering.com/rss.xml",
                  "https://www.enr.com/rss/topic/150-news",
                  "https://www.newcivilengineer.com/feed/"
              ],
              "ai": [
                  "https://openai.com/news/rss.xml",
                  "https://blog.google/technology/ai/rss/",
                  "https://huggingface.co/blog/feed.xml",
                  "https://www.technologyreview.com/topic/artificial-intelligence/feed/",
                  "https://rss.arxiv.org/rss/cs.AI"
              ]
          }

          KEYWORD_BOOSTS = {
              "science": ["discovery", "discover", "research", "study", "scientists", "breakthrough", "first"],
              "tech": ["technology", "device", "engineering", "platform", "chip", "system", "software", "hardware"],
              "medicine": ["disease", "therapy", "drug", "clinical", "patient", "cancer", "medical", "health"],
              "mathematics": ["proof", "theorem", "equation", "algebra", "geometry", "topology", "optimization", "number theory"],
              "space": ["space", "rocket", "orbit", "moon", "mars", "satellite", "nasa", "esa", "mission"],
              "astronomy": ["telescope", "star", "galaxy", "black hole", "astronomy", "planet", "cosmic", "nebula"],
              "architecture": ["architecture", "architect", "building", "design", "facade", "urban", "structural"],
              "construction": ["construction", "infrastructure", "concrete", "bridge", "project", "contractor", "engineering"],
              "ai": ["ai", "artificial intelligence", "machine learning", "model", "llm", "neural", "multimodal", "agent"]
          }

          def clean_text(text):
              text = re.sub(r"<[^>]+>", "", text or "")
              text = re.sub(r"\s+", " ", text).strip()
              return text

          def parse_entry(entry):
              title = clean_text(entry.get("title", ""))
              summary = clean_text(entry.get("summary", entry.get("description", "")))
              link = entry.get("link", "").strip()
              return title, summary, link

          def score_item(category, title, summary):
              text = f"{title} {summary}".lower()
              score = 0

              for kw in KEYWORD_BOOSTS.get(category, []):
                  if kw in text:
                      score += 2

              if any(w in text for w in ["breakthrough", "first ever", "historic", "landmark", "major", "unprecedented"]):
                  score += 5
              if any(w in text for w in ["study", "researchers", "scientists", "engineers", "find", "found", "reveals", "new"]):
                  score += 2
              if len(summary) > 120:
                  score += 1

              return score

          def infer_impact(score):
              if score >= 12:
                  return 5
              if score >= 8:
                  return 4
              if score >= 4:
                  return 3
              if score >= 2:
                  return 2
              return 1

          categories_output = {}
          global_seen_links = set()

          for category, feeds in CATEGORY_FEEDS.items():
              items = []
              local_seen = set()

              for feed_url in feeds:
                  feed = feedparser.parse(feed_url)
                  for entry in feed.entries[:20]:
                      title, summary, link = parse_entry(entry)

                      if not title or not link:
                          continue
                      if link in local_seen or link in global_seen_links:
                          continue

                      score = score_item(category, title, summary)
                      if score < 2:
                          continue

                      local_seen.add(link)
                      global_seen_links.add(link)

                      source = urlparse(link).netloc.replace("www.", "")
                      items.append({
                          "title": title,
                          "summary": (summary[:320] + "...") if len(summary) > 320 else (summary or title),
                          "category": category.capitalize() if category != "ai" else "AI",
                          "source": source,
                          "source_url": link,
                          "impact": infer_impact(score),
                          "_score": score
                      })

              items.sort(key=lambda x: (x["_score"], x["impact"], len(x["title"]) + len(x["summary"])), reverse=True)

              cleaned = []
              for item in items[:MAX_PER_CATEGORY]:
                  item.pop("_score", None)
                  cleaned.append(item)

              categories_output[category] = cleaned

          output = {
              "date": datetime.now(timezone.utc).strftime("%Y-%m-%d"),
              "last_updated": datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC"),
              "categories": categories_output
          }

          with open("discoveries.json", "w", encoding="utf-8") as f:
              json.dump(output, f, indent=2, ensure_ascii=False)

          print("discoveries.json updated successfully")
          PY

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add discoveries.json
          git diff --staged --quiet || git commit -m "Update discoveries by category"
          git push
