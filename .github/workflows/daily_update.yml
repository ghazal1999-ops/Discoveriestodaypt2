name: Update Daily Discoveries

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-discoveries:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4

      - name: Generate discoveries.json
        run: |
          python << 'PY'
          import json
          import re
          from datetime import datetime, timezone
          from urllib.parse import urlparse
          import feedparser
          import requests
          from bs4 import BeautifulSoup

          MAX_PER_CATEGORY = 5

          CATEGORY_FEEDS = {
              "science": [
                  "https://www.sciencedaily.com/rss/top/science.xml",
                  "https://phys.org/rss-feed/",
                  "https://www.sciencenews.org/feed",
                  "https://scitechdaily.com/feed/"
              ],
              "tech": [
                  "http://feeds.arstechnica.com/arstechnica/index",
                  "https://techcrunch.com/feed/",
                  "https://www.theverge.com/rss/index.xml",
                  "https://www.wired.com/feed/rss",
                  "https://www.technologyreview.com/feed/"
              ],
              "medicine": [
                  "https://medicalxpress.com/rss-feed/",
                  "https://www.nih.gov/news-events/news-releases/feed",
                  "https://www.sciencedaily.com/rss/health_medicine.xml",
                  "https://www.news-medical.net/medical/feed/"
              ],
              "mathematics": [
                  "https://www.quantamagazine.org/mathematics/feed/",
                  "https://www.quantamagazine.org/tag/foundations-of-mathematics/feed/",
                  "https://www.ams.org/cgi-bin/notices/rss",
                  "https://news.mit.edu/rss/topic/mathematics",
                  "https://www.nature.com/subjects/mathematics.rss"
              ],
              "space": [
                  "https://www.nasa.gov/rss/dyn/breaking_news.rss",
                  "https://www.sciencedaily.com/rss/top/space_time.xml",
                  "https://www.space.com/feeds/all"
              ],
              "astronomy": [
                  "https://skyandtelescope.org/feed/",
                  "https://www.universetoday.com/feed/",
                  "https://www.space.com/feeds/all"
              ],
              "architecture": [
                  "https://www.archdaily.com/rss",
                  "https://www.dezeen.com/architecture/feed/",
                  "https://www.designboom.com/architecture/feed/"
              ],
              "construction": [
                  "https://www.constructiondive.com/feeds/news/",
                  "https://www.engineering.com/rss.xml",
                  "https://www.enr.com/rss/topic/150-news",
                  "https://www.newcivilengineer.com/feed/"
              ],
              "ai": [
                  "https://openai.com/news/rss.xml",
                  "https://blog.google/technology/ai/rss/",
                  "https://huggingface.co/blog/feed.xml",
                  "https://www.technologyreview.com/topic/artificial-intelligence/feed/",
                  "https://rss.arxiv.org/rss/cs.AI"
              ]
          }

          KEYWORDS = {
              "science": ["discovery","discover","research","study","scientists","breakthrough"],
              "tech": ["technology","device","engineering","chip","robot","software"],
              "medicine": ["disease","therapy","drug","clinical","patient","health"],
              "mathematics": ["proof","theorem","equation","geometry","optimization","mathematics"],
              "space": ["space","rocket","orbit","moon","mars","mission"],
              "astronomy": ["telescope","star","galaxy","planet","cosmic"],
              "architecture": ["architecture","building","design","urban","structural"],
              "construction": ["construction","infrastructure","bridge","concrete","engineering"],
              "ai": ["ai","machine learning","model","llm","neural","agent"]
          }

          HEADERS = {
              "User-Agent": "Mozilla/5.0 (compatible; DiscoveriesTodayBot/1.0)"
          }

          FALLBACK_IMAGES = {
              "science": "https://picsum.photos/seed/sciencefallback/1200/800",
              "tech": "https://picsum.photos/seed/techfallback/1200/800",
              "medicine": "https://picsum.photos/seed/medicinefallback/1200/800",
              "mathematics": "https://picsum.photos/seed/mathfallback/1200/800",
              "space": "https://picsum.photos/seed/spacefallback/1200/800",
              "astronomy": "https://picsum.photos/seed/astronomyfallback/1200/800",
              "architecture": "https://picsum.photos/seed/architecturefallback/1200/800",
              "construction": "https://picsum.photos/seed/constructionfallback/1200/800",
              "ai": "https://picsum.photos/seed/aifallback/1200/800"
          }

          def clean_text(text):
              text = re.sub(r"<[^>]+>", "", text or "")
              text = re.sub(r"\s+", " ", text).strip()
              return text

          def looks_like_bad_image(url):
              if not url:
                  return True
              lower = url.lower()
              bad_words = ["logo", "icon", "avatar", "sprite", "banner", "ads", "favicon"]
              return any(word in lower for word in bad_words)

          def extract_image_from_rss(entry):
              media = entry.get("media_content") or entry.get("media_thumbnail") or []
              if isinstance(media, list) and media:
                  first = media[0]
                  if isinstance(first, dict):
                      url = first.get("url", "")
                      if url and not looks_like_bad_image(url):
                          return url

              summary = entry.get("summary", entry.get("description", "")) or ""
              m = re.search(r"<img[^>]+src=['\\\"]([^'\\\"]+)['\\\"]", summary, re.I)
              if m:
                  url = m.group(1)
                  if url and not looks_like_bad_image(url):
                      return url
              return ""

          def extract_image_from_article(url):
              try:
                  resp = requests.get(url, headers=HEADERS, timeout=12)
                  if resp.status_code != 200:
                      return ""

                  soup = BeautifulSoup(resp.text, "html.parser")

                  og = soup.find("meta", property="og:image")
                  if og and og.get("content"):
                      return og["content"].strip()

                  tw = soup.find("meta", attrs={"name": "twitter:image"})
                  if tw and tw.get("content"):
                      return tw["content"].strip()

                  for img in soup.find_all("img"):
                      src = img.get("src", "").strip()
                      if src.startswith("http") and not looks_like_bad_image(src):
                          return src
              except Exception:
                  return ""
              return ""

          def parse_entry(category, entry):
              title = clean_text(entry.get("title", ""))
              summary = clean_text(entry.get("summary", entry.get("description", "")))
              link = entry.get("link", "").strip()

              image_url = extract_image_from_rss(entry)

              if not image_url and link:
                  image_url = extract_image_from_article(link)

              if not image_url:
                  image_url = FALLBACK_IMAGES[category]

              published = str(entry.get("published", "") or entry.get("updated", "") or "")
              return title, summary, link, image_url, published

          def score_item(category, title, summary):
              text = f"{title} {summary}".lower()
              score = 0
              for kw in KEYWORDS.get(category, []):
                  if kw in text:
                      score += 2
              if "breakthrough" in text:
                  score += 4
              return score

          categories_output = {}

          for category, feeds in CATEGORY_FEEDS.items():
              items = []
              seen_links = set()

              for feed_url in feeds:
                  feed = feedparser.parse(feed_url)

                  for entry in feed.entries[:40]:
                      title, summary, link, image_url, published = parse_entry(category, entry)

                      if not title or not link or link in seen_links:
                          continue

                      seen_links.add(link)
                      score = score_item(category, title, summary)
                      source = urlparse(link).netloc.replace("www.", "")

                      items.append({
                          "title": title,
                          "summary": summary[:320],
                          "category": "AI" if category == "ai" else category.capitalize(),
                          "source": source,
                          "journal": source,
                          "published_at": published or datetime.now(timezone.utc).strftime("%Y-%m-%d"),
                          "source_url": link,
                          "image_url": image_url,
                          "impact": 5 if score >= 8 else 4 if score >= 4 else 3,
                          "_score": score
                      })

              items.sort(key=lambda x: x["_score"], reverse=True)

              cleaned = []
              for item in items[:MAX_PER_CATEGORY]:
                  item.pop("_score", None)
                  cleaned.append(item)

              categories_output[category] = cleaned

          output = {
              "date": datetime.now(timezone.utc).strftime("%Y-%m-%d"),
              "last_updated": datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC"),
              "categories": categories_output
          }

          with open("discoveries.json", "w", encoding="utf-8") as f:
              json.dump(output, f, indent=2, ensure_ascii=False)
          PY

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add discoveries.json
          git diff --staged --quiet || git commit -m "Update daily discoveries"
          git push
